name: Release
# Тег vX.Y.Z → убедиться, что в main лежит dist, собранный из АКТУАЛЬНОГО src,
# и переставить тег на этот dist-коммит. Гарантирует: tarball по тегу = свежий dist.
# Без rebase: сгенерированные dist-файлы конфликтуют при ребейзе с параллельным
# build.yml — вместо этого reset на свежий origin/main + rebuild + commit-если-отличается.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: build dist от свежего main + переставить тег (с ретраями против гонки с build.yml)
        run: |
          git config user.name "CI"
          git config user.email "ci@bulkmaker.local"
          ok=0
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            npm install --no-audit --no-fund
            npm run build
            git add -f dist
            if git diff --cached --quiet; then
              echo "dist в main уже актуален (собран build.yml)"
              ok=1; break
            fi
            git commit -m "build: dist for ${GITHUB_REF_NAME} [skip ci]"
            if git push origin HEAD:main; then ok=1; break; fi
            echo "push отклонён (параллельный build.yml) — ретрай $i"; sleep 5
          done
          [ "$ok" = "1" ] || { echo "::error::не удалось согласовать dist в main"; exit 1; }
          case "${GITHUB_REF_NAME}" in
            v*)
              git tag -f "${GITHUB_REF_NAME}"
              git push -f origin "${GITHUB_REF_NAME}"
              ;;
            *) echo "ref ${GITHUB_REF_NAME} — не тег v*, перестановку тега пропускаю (workflow_dispatch)";;
          esac
