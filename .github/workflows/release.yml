name: Release
# Тег vX.Y.Z → собрать dist → закоммитить в main → переставить тег на этот коммит.
# Гарантирует, что tarball по тегу содержит собранный dist.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - name: commit dist + move tag to dist commit
        run: |
          git config user.name "CI"
          git config user.email "ci@bulkmaker.local"
          git add -f dist
          git commit -m "build: dist for ${GITHUB_REF_NAME} [skip ci]" || echo "dist unchanged"
          # build.yml по push в main тоже коммитит dist → возможна гонка за push.
          # Ребейзим на свежий main и ретраим, пока push не пройдёт.
          pushed=0
          for i in 1 2 3 4 5; do
            git fetch origin main
            if ! git rebase origin/main; then git rebase --abort; sleep 3; continue; fi
            if git push origin HEAD:main; then pushed=1; break; fi
            echo "push main конфликт — ретрай $i"; sleep 3
          done
          if [ "$pushed" != "1" ]; then echo "::error::не удалось запушить dist в main после ретраев"; exit 1; fi
          # Тег ставим на итоговый dist-коммит (force — тег уже существует от пуша).
          git tag -f "${GITHUB_REF_NAME}"
          git push -f origin "${GITHUB_REF_NAME}"
