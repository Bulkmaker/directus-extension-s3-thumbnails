name: Build dist
on:
  push:
    branches: [main]
    paths: ['src/**', 'package.json', 'tsconfig.json']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild dist [skip ci]"
          file_pattern: 'dist/**'
